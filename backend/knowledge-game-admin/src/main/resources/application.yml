server:
  port: 8081

logging:
  file:
    path: logs

cors:
  allowed-origins: http://localhost:*

spring:
  application:
    name: knowledge-game-admin
  config:
    import:
      - nacos:common.yml?refresh=true
      - nacos:knowledge-game-admin.yml?refresh=true
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        namespace: ${NACOS_NAMESPACE:}
      config:
        namespace: ${NACOS_NAMESPACE:}

m2m:
  auth:
    enabled: true
    service-name: knowledge-game-admin
    api-key: ${FILE_SERVICE_API_KEY:default-dev-key}

knowledgegame:
  file:
    upload-base-url: http://localhost:8083
