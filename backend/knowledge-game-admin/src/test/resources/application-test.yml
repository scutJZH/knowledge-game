server:
  port: 0

cors:
  allowed-origins: http://localhost:*

spring:
  config:
    import: "optional:nacos:"
  jackson:
    serialization:
      write-dates-as-timestamps: true
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/knowledge-game?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

jwt:
  secret: "knowledge-game-admin-jwt-secret-key-must-be-at-least-32-characters-long"
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

m2m:
  auth:
    enabled: true
    service-name: knowledge-game-admin
    services:
      knowledge-game-file: test-api-key

knowledgegame:
  log:
    masking-fields:
      - password
      - token
      - accessToken
      - refreshToken
      - secret
  file:
    upload-base-url: http://localhost:8083
