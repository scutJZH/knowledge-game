server:
  port: 0

cors:
  allowed-origins: http://localhost:*

spring:
  config:
    import: "optional:nacos:"
  jackson:
    serialization:
      write-dates-as-timestamps: true
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  datasource:
    # REQ-86: 测试库与生产库隔离，避免集成测试污染真实数据
    # 本地需手动执行：CREATE DATABASE knowledge_game_test DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    url: jdbc:mysql://localhost:3306/knowledge_game_test?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # REQ-86: 集成测试自动建表/清理（避免维护测试库 schema）
      ddl-auto: create-drop
    # REQ-86: 显式指定 dialect，避免 Hibernate 在 JDBC metadata 拿不到时启动失败
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
    open-in-view: false

jwt:
  secret: "knowledge-game-admin-jwt-secret-key-must-be-at-least-32-characters-long"
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

m2m:
  auth:
    enabled: true
    service-name: knowledge-game-admin
    services:
      knowledge-game-file: test-api-key

knowledgegame:
  log:
    masking-fields:
      - password
      - token
      - accessToken
      - refreshToken
      - secret
  file:
    upload-base-url: http://localhost:8083
