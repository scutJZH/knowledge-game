server:
  port: 8083

logging:
  file:
    path: logs

cors:
  allowed-origins: http://localhost:*

spring:
  application:
    name: knowledge-game-file
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  config:
    import:
      - nacos:common.yml?refresh=true
      - nacos:knowledge-game-file.yml?refresh=true
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        namespace: ${NACOS_NAMESPACE:}
      config:
        namespace: ${NACOS_NAMESPACE:}
  jpa:
    hibernate:
      ddl-auto: update

knowledgegame:
  file:
    storage:
      type: local
      local:
        storage-dir: ./uploads
    upload:
      max-file-size: 10MB
      allowed-types:
        - image/jpeg
        - image/png
        - image/gif
        - image/webp
    credential:
      expire-minutes: 5

m2m:
  auth:
    enabled: true
    protectedPaths: /api/file/internal/**
    api-key: ${FILE_SERVICE_API_KEY:default-dev-key}
